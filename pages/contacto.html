<!doctype html>
<html lang="es" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Contacto de la plantilla de bootstrap" />
    <meta name="author" content="Alejo Acuña" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../css/style.css" />
    <title>Contacto</title>
  </head>
  <body>
    <header>
      <nav class="navbar bg-primary navbar-expand-lg">
        <div class="container">
          <a href="/index.html" class="navbar-brand">Plantilla de bootstrap</a>
          <button
            class="navbar-toggler"
            data-bs-toggle="collapse"
            data-bs-target="#opcionesMenu"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="opcionesMenu">
            <ul class="navbar-nav ms-auto">
              <li class="navbar-item">
                <a class="nav-link" href="../index.html">Inicio</a>
              </li>
              <li class="navbar-item">
                <a class="nav-link" href="../pages/grilla.html">Grilla</a>
              </li>
              <li class="navbar-item">
                <a class="nav-link active" href="../pages/contacto.html"
                  >Contacto</a
                >
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>
    <main class="container my-4">
      <h2 class="mb-4 fw-bold">Formularios con Stacks</h2>
      <div class="border rounded-3 p-3 p-md-4">
        <form>
          <div class="mb-3">
            <label for="inputNombre" class="form-label fw-bold">Nombre</label>
            <input
              type="text"
              class="form-control"
              id="inputNombre"
              placeholder="Ej: Juan"
            />
          </div>
          <div class="mb-3">
            <label for="inputEmail" class="form-label fw-bold">Email</label>
            <input
              type="email"
              class="form-control"
              id="inputEmail"
              placeholder="test@ejemplo.com"
            />
          </div>
          <div class="mb-3">
            <label for="inputMensaje" class="form-label fw-bold">Mensaje</label>
            <textarea
              class="form-control"
              id="inputMensaje"
              rows="3"
              placeholder="agrega aqui tu mensaje"
            ></textarea>
          </div>
          <div class="form-check form-switch mb-4">
            <input
              class="form-check-input"
              type="checkbox"
              role="switch"
              id="switchTerminos"
            />
            <label class="form-check-label" for="switchTerminos">Aceptar términos (Switch)</label>
          </div>
          <button type="button" class="btn btn-primary px-4">Enviar</button>
        </form>
      </div>
    </main>
    <footer class="text-center bg-dark-subtle py-4">
      &copy;Todos los derechos reservados 2026.
    </footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
